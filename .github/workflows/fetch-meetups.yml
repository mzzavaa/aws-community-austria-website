name: Fetch Meetup Events

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:        # allow manual runs

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch events
        run: node scripts/fetch-meetups.mjs

      - name: Commit updated meetups.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/meetups.json
          git diff --cached --quiet || git commit -m "chore: update meetup events [skip ci]"
          git push
